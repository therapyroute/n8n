version: '3'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"   # Expose n8n's port
    environment:
      - N8N_HOST=localhost   # Replace 'localhost' with your domain if needed
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - ~/.n8n:/home/node/.n8n   # Persist data
